<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ammo Price Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

  /* == TICKER BAR == */
  #ticker-wrap {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    overflow: hidden;
    height: 42px;
    display: flex;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #ticker-track {
    display: flex;
    align-items: center;
    gap: 0;
    white-space: nowrap;
    animation: ticker-scroll 80s linear infinite;
  }
  #ticker-track:hover { animation-play-state: paused; }
  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .tick-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 20px;
    border-right: 1px solid #30363d;
    font-size: 13px;
    height: 42px;
  }
  .tick-label { color: #8b949e; font-weight: 500; letter-spacing: 0.02em; }
  .tick-price { color: #e6edf3; font-weight: 600; font-variant-numeric: tabular-nums; }
  .tick-sep { color: #30363d; }
  .tick-change {
    font-size: 12px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    display: inline-flex;
    align-items: center;
    gap: 2px;
  }
  .tick-up   { color: #3fb950; }
  .tick-down { color: #f85149; }
  .tick-flat { color: #8b949e; }
  .tick-period { font-size: 10px; color: #8b949e; font-weight: 400; }
  .tick-nodata { color: #484f58; font-style: italic; font-size: 12px; }

  /* == HEADER == */
  .header {
    padding: 20px 24px 12px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header h1 { font-size: 20px; font-weight: 600; color: #e6edf3; }
  .header .subtitle { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .controls { display: flex; gap: 6px; align-items: center; }
  .range-btn {
    background: none; border: 1px solid #30363d; color: #8b949e;
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
    transition: all 0.15s;
  }
  .range-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .range-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

  /* == GRID == */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding: 16px 24px 32px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-title { font-size: 14px; font-weight: 600; color: #e6edf3; }
  .card-best {
    text-align: right;
  }
  .card-best .cpr { font-size: 22px; font-weight: 700; color: #58a6ff; line-height: 1; }
  .card-best .retailer { font-size: 11px; color: #8b949e; margin-top: 3px; max-width: 150px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-best .no-data { font-size: 13px; color: #484f58; }
  .card-changes {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .change-pill {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-variant-numeric: tabular-nums;
  }
  .change-pill .period-label { font-weight: 400; color: inherit; opacity: 0.75; font-size: 11px; }
  .pill-up   { background: rgba(63,185,80,0.12);  color: #3fb950; }
  .pill-down { background: rgba(248,81,73,0.12);  color: #f85149; }
  .pill-flat { background: rgba(139,148,158,0.1); color: #8b949e; }
  .pill-none { background: rgba(139,148,158,0.08); color: #484f58; }
  .chart-wrap { position: relative; height: 90px; }
  .card-rows { font-size: 11px; color: #8b949e; border-top: 1px solid #21262d; padding-top: 8px; }
  .card-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .card-row .name { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-row .price-info { display: flex; gap: 8px; flex-shrink: 0; }
  .card-row .price-info span { color: #e6edf3; }
  #footer { text-align: center; font-size: 11px; color: #484f58; padding-bottom: 24px; }
  .loading { text-align: center; padding: 60px; color: #8b949e; font-size: 14px; }
</style>
</head>
<body>

<div id="ticker-wrap">
  <div id="ticker-track"><span class="tick-item" style="color:#484f58">Loading prices...</span></div>
</div>

<div class="header">
  <div>
    <h1>Ammo Price Tracker</h1>
    <div class="subtitle" id="last-updated"></div>
  </div>
  <div class="controls">
    <button class="range-btn" data-days="7">7d</button>
    <button class="range-btn active" data-days="30">30d</button>
    <button class="range-btn" data-days="90">90d</button>
    <button class="range-btn" data-days="0">All</button>
  </div>
</div>

<div id="grid"><div class="loading">Fetching prices...</div></div>
<div id="footer"></div>

<script>
let _data = null;
let _days = 30;
const charts = {};

document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _days = parseInt(btn.dataset.days);
    if (_data) renderAll(_data);
  });
});

function getCpr(search, daysAgo) {
  const hist = search.history || [];
  if (!hist.length) return null;
  if (daysAgo === 0) {
    // Most recent entry with results
    for (let i = hist.length - 1; i >= 0; i--) {
      if (hist[i].results && hist[i].results.length) return hist[i].results[0].cpr;
    }
    return null;
  }
  // Find entry closest to daysAgo days before the latest date
  const latestDate = hist[hist.length - 1].date;
  const target = new Date(latestDate);
  target.setDate(target.getDate() - daysAgo);
  const targetStr = target.toISOString().slice(0, 10);
  // Find closest entry on or before target
  let best = null;
  for (let i = hist.length - 1; i >= 0; i--) {
    if (hist[i].date <= targetStr && hist[i].results && hist[i].results.length) {
      best = hist[i].results[0].cpr;
      break;
    }
  }
  return best;
}

function fmtChange(curr, prev) {
  if (curr === null || prev === null) return null;
  const diff = curr - prev;
  const sign = diff > 0 ? '+' : '';
  const arrow = diff > 0 ? '\u25b2' : diff < 0 ? '\u25bc' : '\u25cf';
  const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
  return { text: sign + diff.toFixed(1) + '\u00a2', arrow, cls };
}

function buildTicker(searches) {
  const items = Object.values(searches).map(s => {
    const curr  = getCpr(s, 0);
    const d1    = fmtChange(curr, getCpr(s, 1));
    const d7    = fmtChange(curr, getCpr(s, 7));

    const priceStr = curr !== null ? curr.toFixed(1) + '\u00a2' : '--';

    let d1Html = '', d7Html = '';
    if (d1) {
      d1Html = `<span class="tick-change tick-${d1.cls}">${d1.arrow} ${d1.text}</span><span class="tick-period">1d</span>`;
    }
    if (d7) {
      d7Html = `<span class="tick-sep">\u00b7</span><span class="tick-change tick-${d7.cls}">${d7.arrow} ${d7.text}</span><span class="tick-period">7d</span>`;
    }

    return `<span class="tick-item">
      <span class="tick-label">${s.label}</span>
      <span class="tick-price">${priceStr}</span>
      ${d1Html}${d7Html}
    </span>`;
  });

  // Duplicate for seamless loop
  const html = items.join('') + items.join('');
  document.getElementById('ticker-track').innerHTML = html;
}

function changePill(curr, prev, label) {
  if (curr === null || prev === null) {
    return `<span class="change-pill pill-none"><span class="period-label">${label}</span> --</span>`;
  }
  const ch = fmtChange(curr, prev);
  return `<span class="change-pill pill-${ch.cls}">${ch.arrow} ${ch.text} <span class="period-label">${label}</span></span>`;
}

function renderAll(data) {
  _data = data;
  buildTicker(data.searches);

  if (data.last_updated) {
    const d = new Date(data.last_updated);
    document.getElementById('last-updated').textContent = 'Updated ' + d.toLocaleString();
  }

  const cutoff = _days > 0
    ? new Date(Date.now() - _days * 86400000).toISOString().slice(0, 10)
    : '0000-00-00';

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  Object.entries(data.searches).forEach(([sid, search]) => {
    const hist = (search.history || []).filter(h => h.date >= cutoff);

    const curr = getCpr(search, 0);
    const prev1 = getCpr(search, 1);
    const prev7 = getCpr(search, 7);

    // Best result info
    let bestCpr = curr;
    let bestRetailer = '';
    if (search.history && search.history.length) {
      for (let i = search.history.length - 1; i >= 0; i--) {
        if (search.history[i].results && search.history[i].results.length) {
          bestRetailer = search.history[i].results[0].retailer;
          break;
        }
      }
    }

    // Chart data
    const labels = hist.map(h => h.date);
    const prices = hist.map(h => h.results && h.results.length ? h.results[0].cpr : null);
    const hasChart = prices.some(p => p !== null);

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${search.label}</div>
        <div class="card-best">
          ${bestCpr !== null
            ? `<div class="cpr">${bestCpr.toFixed(1)}&#162;</div><div class="retailer">${bestRetailer}</div>`
            : `<div class="no-data">No data</div>`}
        </div>
      </div>
      <div class="card-changes">
        ${changePill(curr, prev1, '1d')}
        ${changePill(curr, prev7, '7d')}
      </div>
      ${hasChart ? `<div class="chart-wrap"><canvas id="c-${sid}"></canvas></div>` : ''}
      ${buildRows(search, cutoff)}
    `;
    grid.appendChild(card);

    if (hasChart) {
      const ctx = document.getElementById('c-' + sid).getContext('2d');
      if (charts[sid]) charts[sid].destroy();
      charts[sid] = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: prices,
            borderColor: '#58a6ff',
            backgroundColor: 'rgba(88,166,255,0.08)',
            borderWidth: 1.5,
            pointRadius: prices.length <= 14 ? 3 : 0,
            pointHoverRadius: 4,
            spanGaps: true,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: {
            callbacks: { label: ctx => ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1) + '\u00a2' : 'No data' }
          }},
          scales: {
            x: { display: false },
            y: { display: true, ticks: { color: '#8b949e', font: { size: 10 }, callback: v => v.toFixed(0) + '\u00a2' },
                 grid: { color: '#21262d' } }
          }
        }
      });
    }
  });

  const total = Object.keys(data.searches).length;
  document.getElementById('footer').textContent = total + ' searches tracked';
}

function buildRows(search, cutoff) {
  // Show best 2 results from latest scrape
  if (!search.history || !search.history.length) return '';
  let latest = null;
  for (let i = search.history.length - 1; i >= 0; i--) {
    if (search.history[i].results && search.history[i].results.length) {
      latest = search.history[i]; break;
    }
  }
  if (!latest) return '';
  const rows = latest.results.slice(0, 2).map(r =>
    `<div class="card-row">
      <span class="name">${r.retailer}</span>
      <span class="price-info">
        <span>${r.cpr_text ? r.cpr_text.replace(/c$/, '\u00a2') : r.cpr.toFixed(1) + '\u00a2'}</span>
        <span>${r.price}/${r.rounds}rd</span>
        <span>${r.shipping === 'F' ? '&#x1F193; ship' : r.shipping ? '+$' + r.shipping + ' ship' : ''}</span>
      </span>
    </div>`
  ).join('');
  return `<div class="card-rows">${rows}</div>`;
}

// Fetch data
fetch('ammo_prices.json?t=' + Date.now())
  .then(r => r.json())
  .then(renderAll)
  .catch(e => {
    document.getElementById('grid').innerHTML = '<div class="loading">Error loading data: ' + e.message + '</div>';
  });
</script>
</body>
</html>
